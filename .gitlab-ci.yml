stages:
  - lint
  - security
  - mirror

lint:powershell:
  stage: lint
  image: mcr.microsoft.com/powershell:7.4-alpine-3.20
  script:
    - |
      pwsh -Command '
        $hasErrors = $false
        Get-ChildItem -Recurse -Filter "*.ps1" | ForEach-Object {
          Write-Host "Checking: $($_.FullName)"
          $parseErrors = $null
          [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$parseErrors) | Out-Null
          if ($parseErrors) {
            $parseErrors | ForEach-Object { Write-Error $_ }
            $hasErrors = $true
          }
        }
        if ($hasErrors) { exit 1 }
      '

lint:scriptanalyzer:
  stage: lint
  image: mcr.microsoft.com/powershell:7.4-alpine-3.20
  script:
    - |
      pwsh -Command '
        Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
        $results = Get-ChildItem -Recurse -Filter "*.ps1" | ForEach-Object {
          Invoke-ScriptAnalyzer -Path $_.FullName -Severity Warning,Error
        }
        if ($results) {
          $results | Format-Table -AutoSize
          Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)"
          exit 1
        }
        Write-Host "PSScriptAnalyzer: all clean"
      '
  allow_failure: true

include:
  - project: 'user-projects/claude-standards'
    file: '/ci-templates/generic-security.yml'
    ref: main
  - project: 'user-projects/claude-standards'
    file: '/ci-templates/github-mirror.yml'
    ref: main

security:gitleaks:
  extends: .gitleaks-scan

security:trufflehog:
  extends: .trufflehog-scan

mirror:github:
  extends: .github-mirror
  variables:
    GITHUB_REPO_URL: "git@github.com:LemonWasTakenAgain/Powershell_Scripts.git"
